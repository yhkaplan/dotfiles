# COPY/PASTE in Vim style
# Activate Tmux copy mode w/ ctrl a [, use Vim keybindings to select and copy,
# Then use ctrl a ] to paste
set -g default-shell $SHELL
# macOS copy/paste
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

# avoid conflicts with NeoVim
set -g escape-time 10
set -g focus-events on

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Vimのキーバインドでペインを移動する
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# マウス操作を有効にする
set -g mouse on

# Add truecolor support
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Default terminal is 256 colors
#set -g default-terminal "screen-256color"

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# increase scrollback lines
set -g history-limit 10000

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Status bar configuration (dotbar-inspired)
set -g status-position bottom
set -g status-justify left

# Transparent background, clean look
set -g status-style 'bg=default,fg=brightblack'

# Refresh every second for time
set -g status-interval 1

# Left: session name (dimmed)
set -g status-left-length 30
set -g status-left '#[fg=brightblack] #S  #[fg=default]'

# Right: prefix indicator + time
set -g status-right-length 50
set -g status-right '#{?client_prefix,#[fg=cyan]• ,}#[fg=brightblack]%H:%M '

# Window format: just the name, dimmed
set -g window-status-format '#[fg=brightblack] #W '

# Current window: highlighted with accent color
set -g window-status-current-format '#[fg=magenta,bold] #W '

# Bullet separator between windows
set -g window-status-separator '#[fg=brightblack]•'

# Pane borders
set -g pane-border-style 'fg=brightblack'
set -g pane-active-border-style 'fg=magenta'

# Message styling
set -g message-style 'fg=cyan,bg=default'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
